<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<meta name="googlebot" content="noindex,nofollow">
<title>REVERB JP | 광고주 신청</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Sora:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --brand: #E8344E;
  --brand-dark: #C41E3A;
  --brand-soft: #FFF0F2;
  --ink: #161618;
  --ink-soft: #4A4A4F;
  --ink-mute: #8A8A90;
  --paper: #FAFAF7;
  --card: #FFFFFF;
  --border: #EAEAE4;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  font-family: 'Sora', 'Noto Sans KR', 'Noto Sans JP', sans-serif;
  background: var(--paper);
  color: var(--ink);
  line-height: 1.6;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

body {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  padding: 40px 24px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.brand-logo {
  font-family: 'Sora', 'Noto Sans KR', sans-serif;
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.03em;
  color: var(--ink);
  margin-bottom: 32px;
  text-align: center;
}

.eyebrow {
  font-size: 11px;
  font-weight: 700;
  color: var(--brand);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 14px;
}

.title {
  font-family: 'Sora', 'Noto Sans KR', sans-serif;
  font-size: 26px;
  font-weight: 800;
  line-height: 1.3;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
  text-align: center;
  color: var(--ink);
}

.desc {
  font-size: 14px;
  color: var(--ink-soft);
  line-height: 1.7;
  text-align: center;
  margin-bottom: 32px;
}

.contact-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 22px;
  margin-bottom: 20px;
}

.contact-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.contact-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  font-size: 13px;
  color: var(--ink-soft);
  border-bottom: 1px solid var(--border);
}

.contact-row:last-child { border-bottom: none; }

.contact-row .k {
  color: var(--ink-mute);
  min-width: 64px;
  font-weight: 600;
}

.contact-row .v a {
  color: var(--brand);
  text-decoration: none;
  font-weight: 600;
}

.footnote {
  font-size: 11px;
  color: var(--ink-mute);
  text-align: center;
  margin-top: 20px;
  line-height: 1.6;
}
</style>
</head>
<body>

<div class="brand-logo">Reverb</div>
<div class="eyebrow">REVERB JP</div>
<h1 class="title">광고주 신청</h1>
<p class="desc">영업 담당자에게 전달받으신 전용 URL로 접속해주세요.<br>직접 접근이 제한된 페이지입니다.</p>

<div class="contact-card">
  <div class="contact-label">Contact</div>
  <div class="contact-row"><span class="k">LINE</span><span class="v"><a href="https://line.me/R/ti/p/@reverb.jp">@reverb.jp</a></span></div>
  <div class="contact-row"><span class="k">KakaoTalk</span><span class="v">byhyunho7</span></div>
  <div class="contact-row"><span class="k">TEL</span><span class="v"><a href="tel:+821025501511">010-2550-1511</a></span></div>
</div>

<div class="footnote">© JFUN Corp. / 株式会社ジェイファン</div>

</body>
</html>
