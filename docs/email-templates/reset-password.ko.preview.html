<!DOCTYPE html>
<!--
  미리보기 전용 한국어 번역본 (검수용).
  실제 메일 발송에는 사용되지 않습니다 — Supabase Email Template에는 reset-password.html(일본어 원본)만 등록.
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background:#E8E0EC;font-family:'Helvetica Neue',Arial,'Apple SD Gothic Neo','Noto Sans KR','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#E8E0EC;padding:40px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:440px;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 2px 6px 2px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);">

          <!-- 헤더 -->
          <tr>
            <td style="background:#2D1F2B;padding:28px 24px;text-align:center;">
              <div style="width:44px;height:44px;background:#C878A3;border-radius:10px;display:inline-block;line-height:44px;font-family:'Helvetica Neue',Arial,sans-serif;font-weight:800;font-size:20px;color:#ffffff;">R</div>
              <div style="color:#ffffff;font-size:18px;font-weight:700;margin-top:10px;letter-spacing:0.5px;">REVERB JP</div>
            </td>
          </tr>

          <!-- 본문 -->
          <tr>
            <td style="padding:32px 28px 24px;">
              <h1 style="font-size:18px;font-weight:700;color:#1E1320;margin:0 0 16px;line-height:1.5;">비밀번호 재설정 안내</h1>
              <p style="font-size:14px;color:#7A6B78;line-height:1.7;margin:0 0 12px;">
                항상 REVERB JP를 이용해 주셔서 감사합니다.
              </p>
              <p style="font-size:14px;color:#7A6B78;line-height:1.7;margin:0 0 24px;">
                아래 버튼을 클릭해 새 비밀번호를 설정해 주세요.
              </p>

              <!-- CTA 버튼 -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding:4px 0 28px;">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block;background:#C878A3;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;padding:14px 40px;border-radius:12px;letter-spacing:0.3px;">
                      비밀번호 재설정하기
                    </a>
                  </td>
                </tr>
              </table>

              <!-- 보충 -->
              <div style="background:#FDF0F7;border-radius:10px;padding:16px 18px;margin-bottom:8px;">
                <p style="font-size:12px;color:#7D4A6A;line-height:1.7;margin:0;">
                  ⏰ 본 링크는 <strong>1시간 후</strong> 만료됩니다.<br>
                  빠른 시간 안에 비밀번호를 재설정해 주세요.
                </p>
              </div>
            </td>
          </tr>

          <!-- 구분선 -->
          <tr>
            <td style="padding:0 28px;">
              <div style="border-top:1px solid #EDE6ED;"></div>
            </td>
          </tr>

          <!-- 버튼이 작동하지 않을 때 -->
          <tr>
            <td style="padding:20px 28px;">
              <p style="font-size:11px;color:#7A6B78;line-height:1.7;margin:0;">
                버튼이 작동하지 않을 경우 아래 URL을 브라우저에 복사해 주세요:
              </p>
              <p style="font-size:11px;color:#C878A3;line-height:1.6;margin:6px 0 0;word-break:break-all;">
                {{ .ConfirmationURL }}
              </p>
            </td>
          </tr>

          <!-- 푸터 -->
          <tr>
            <td style="background:#F8F5F8;padding:20px 28px;text-align:center;">
              <p style="font-size:11px;color:#7A6B78;line-height:1.6;margin:0;">
                ※ 본 메일이 본인과 관계없는 경우 무시하셔도 됩니다.<br>
                계정의 비밀번호는 변경되지 않습니다.
              </p>
              <p style="font-size:11px;color:#7A6B78;margin:12px 0 0;">
                © REVERB JP — 인플루언서 체험단 플랫폼
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
